<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Million checkboxes</title>
</head>
<body>
    <div id="container">

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById("container");

        // const CHECKBOX_COUNT = 1000;

        socket.on("server:checkbox:change",(data)=>{
            console.log(`socket server Event`,data)

            const {index,checked} = data;

            const input = document.getElementById(`checkbox-${index}`);

            if(input){
                input.checked = checked;
            }
        })

        window.addEventListener("load",async ()=>{
            const response = await fetch("/checkboxes" ,{method : "GET"})
            // console.log(response);
            const data = await response.json();
            console.log(data.checkboxes);
            if(data && data.checkboxes){
                data.checkboxes.forEach((serverValue,index)=>{
                    const input = document.createElement("input");

                    input.type = "checkbox";
                    input.id = `checkbox-${index}`;
                    input.checked = serverValue

                    input.addEventListener("change",(event) =>{
                    const checked =  event.target.checked;
                    console.log("Checkboc changes",{index,checked});
                    socket.emit("client:checkedbox:change",{index,checked});
                })
                container.appendChild(input);
                })
            }
        })
    </script>
</body>
</html>
